appId: com.electronReactTemplate.app
productName: ElectronReactTemplate
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - node_modules/**/*
  - package.json
includeSubNodeModules: true
win:
  executableName: ElectronReactTemplate
  signAndEditExecutable: false
  target:
    - target: dir
      arch: [x64]
