appId: com.testelectron.app
productName: TestElectron
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - node_modules/**/*
  - package.json
includeSubNodeModules: true
win:
  executableName: TestElectron
  signAndEditExecutable: false
  target:
    - target: dir
      arch: [x64]
